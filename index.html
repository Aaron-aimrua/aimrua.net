<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente - Estamos construyendo algo nuevo | AIMRUA.NET</title>
    <link rel="icon" href="LOGO.png" type="image/x-icon">
    <style>
        /* Variables Globales */
        :root {
            /* Colores basados en el logo AIMRUA */
            --bg-gradient: radial-gradient(circle at 80% 20%, #0c3a4d 0%, #0c1117 50%, #050608 100%);
            --color-text-white: #ffffff;
            --color-text-light: #f0f6f8;
            --color-text-secondary: #7fa1b5;
            --color-text-accent: #1cbcd4; /* Azul/Cian brillante */
            --color-text-muted: rgba(255, 255, 255, 0.4);
            --color-divider: rgba(28, 188, 212, 0.25);

            /* Tipografía y Espaciado */
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --padding-body: 40px 20px;
            --max-width-header: 1200px;
            --max-width-content: 600px;

            /* Animaciones */
            --transition-fade: fadeIn 1.5s ease-out;
        }

        /* Reset básico y configuración de la fuente */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            color: var(--color-text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: var(--padding-body);
            background: var(--bg-gradient);
            overflow: hidden;
        }

        /* Contenedor del Logo (Esquina superior izquierda) */
        .header {
            width: 100%;
            max-width: var(--max-width-header);
            display: flex;
            justify-content: flex-start;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Icono del logo hecho con CSS (tres líneas onduladas/estilo olas) */
        .logo-icon {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .logo-image {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        /* Contenido Central */
        .main-content {
            text-align: center;
            max-width: var(--max-width-content);
            animation: var(--transition-fade);
        }

        .tagline {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--color-text-accent);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 25px;
            color: var(--color-text-light);
        }

        /* Línea divisoria sutil */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--color-divider), transparent);
            margin: 0 auto 25px auto;
        }

        .description {
            font-size: 1rem;
            color: var(--color-text-secondary);
            line-height: 1.6;
            font-weight: 300;
        }

        /* Pie de página */
        .footer {
            font-size: 0.75rem;
            color: var(--color-text-muted);
            letter-spacing: 0.5px;
        }

        /* Animación suave de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Adaptación para pantallas pequeñas */
        @media (max-width: 600px) {
            .title { font-size: 1.8rem; }
            .description { font-size: 0.9rem; }
        }
</style>
</head>
<body>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <img src="LOGO.png" alt="Logo" class="logo-image">
            </div>
        </div>
    </header>

    <main class="main-content">
        <p class="tagline">Próximamente</p>
        <h1 class="title">Estamos construyendo algo nuevo</h1>
        <div class="divider"></div>
        <p class="description">Este sitio está en construcción. Vuelve pronto para ver las novedades.</p>
    </main>

    <footer class="footer">
        © 2026 · Todos los derechos reservados
        <a href="AMAZON/GENERAL.html" style="color: var(--color-text-accent); text-decoration: none;">AIMRUA.NET</a>
    </footer>

</body>
</html>
