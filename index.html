<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIMRUA.NET</title>
<style>
  :root {
    --ink: #eae6dc;
    --ink-dim: rgba(234, 230, 220, 0.62);
    --slate-deep: #10141a;
    --slate: #232a33;
    --ochre: #7a5a30;
    --ochre-bright: #b98a45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(ellipse 120% 90% at 15% 10%, rgba(120,130,140,0.55), transparent 55%),
      radial-gradient(ellipse 100% 80% at 85% 30%, rgba(130,90,40,0.5), transparent 60%),
      linear-gradient(115deg, var(--slate-deep) 0%, var(--slate) 42%, #2b2118 62%, #0d0906 100%);
    background-color: var(--slate-deep);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  /* líneas sutiles que simulan cauces / vetas de terreno */
  .veins {
    position: absolute;
    inset: 0;
    opacity: 0.35;
    background-image:
      repeating-linear-gradient(115deg, transparent 0 18px, rgba(234,230,220,0.05) 18px 19px),
      repeating-linear-gradient(70deg, transparent 0 34px, rgba(185,138,69,0.05) 34px 35px);
    pointer-events: none;
    mix-blend-mode: overlay;
    animation: drift 40s linear infinite;
  }

  @keyframes drift {
    from { transform: translate3d(0,0,0); }
    to   { transform: translate3d(-40px, 20px, 0); }
  }

  .mark {
    position: absolute;
    top: 28px;
    left: 32px;
    width: 26px;
    height: 26px;
    opacity: 0.85;
  }

  main {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    padding: 0 24px;
  }

  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ochre-bright);
    font-weight: 600;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 400;
    letter-spacing: 0.01em;
    color: var(--ink);
  }

  .divider {
    width: 44px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--ink-dim), transparent);
  }

  p.message {
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: var(--ink-dim);
    max-width: 34ch;
    line-height: 1.6;
  }

  footer {
    position: absolute;
    bottom: 30px;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: rgba(234, 230, 220, 0.35);
    z-index: 2;
  }

  @media (prefers-reduced-motion: reduce) {
    .veins { animation: none; }
  }
</style>
</head>
<body>

  <div class="veins"></div>

  <svg class="mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 8c2-3 5-4 8-2s6 1 8-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>
    <path d="M4 14c2-3 5-4 8-2s6 1 8-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
    <path d="M4 20c2-3 5-4 8-2s6 1 8-2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.35"/>
  </svg>

  <main>
    <span class="eyebrow">Próximamente</span>
    <h1>Estamos construyendo algo nuevo</h1>
    <div class="divider"></div>
    <p class="message">Este sitio está en construcción. Vuelve pronto para ver las novedades.</p>
  </main>

  <footer>© 2026 · Todos los derechos reservados</footer>

</body>
</html>
